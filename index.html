<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Premium New Year Diaries, Corporate Planners & Executive Journals. Manufacturer direct pricing. Custom branding with debossing & foil stamping. Bulk orders from 25 units.">
  <title>New Year Diaries | Premium Diaries & Corporate Planners | Manufacturer Direct</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app-loader">
    <div class="loader-grain"></div>
    <div class="loader-wrap">
      <img class="loader-logo" src="/logo-big-transparent.png" alt="New Year Diaries">
      <div class="loader-diary" aria-hidden="true">
        <div class="loader-cover"></div>
        <div class="loader-page loader-page-one"></div>
        <div class="loader-page loader-page-two"></div>
        <div class="loader-ribbon"></div>
      </div>
      <div class="loader-copy">
        <strong>Preparing your 2026 collection</strong>
        <span>Manufacturer direct diaries, planners and gifting.</span>
      </div>
      <div class="loader-track"><span></span></div>
    </div>
  </div>
  <style>
    #app-loader{position:fixed;inset:0;display:grid;place-items:center;overflow:hidden;background:#f7f1e9;z-index:9999;transition:opacity .35s ease}
    #app-loader:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(165,86,48,.16),transparent 34%),linear-gradient(315deg,rgba(35,93,86,.13),transparent 38%),radial-gradient(circle at 50% 25%,rgba(255,255,255,.9),transparent 34%);pointer-events:none}
    .loader-grain{position:absolute;inset:0;opacity:.28;background-image:repeating-linear-gradient(90deg,rgba(60,42,28,.05) 0 1px,transparent 1px 5px),repeating-linear-gradient(0deg,rgba(60,42,28,.04) 0 1px,transparent 1px 6px)}
    .loader-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:20px;width:min(88vw,420px);padding:36px 28px;text-align:center;font-family:Poppins,sans-serif;color:#34302b}
    .loader-logo{width:min(70vw,320px);height:auto;object-fit:contain;filter:drop-shadow(0 10px 18px rgba(72,45,28,.12))}
    .loader-diary{position:relative;width:112px;height:138px;perspective:420px}
    .loader-cover{position:absolute;inset:0;border-radius:10px 16px 16px 10px;background:linear-gradient(135deg,#7b2f2a,#b9653d 58%,#d2a064);box-shadow:0 22px 42px rgba(71,38,22,.24),inset 9px 0 0 rgba(255,255,255,.16),inset -4px 0 0 rgba(57,25,18,.18)}
    .loader-cover:before{content:"2026";position:absolute;top:24px;left:22px;font-size:18px;font-weight:500;letter-spacing:0;color:#ffe7bd}
    .loader-cover:after{content:"";position:absolute;left:20px;right:22px;top:58px;height:2px;background:rgba(255,231,189,.7);box-shadow:0 16px 0 rgba(255,231,189,.52),0 32px 0 rgba(255,231,189,.35)}
    .loader-page{position:absolute;inset:8px 8px 8px 14px;border-radius:7px 13px 13px 7px;background:#fffaf2;transform-origin:left center;box-shadow:0 8px 18px rgba(48,32,22,.14)}
    .loader-page-one{animation:pageFlip 1.55s ease-in-out infinite}
    .loader-page-two{animation:pageFlip 1.55s ease-in-out infinite .32s}
    .loader-ribbon{position:absolute;left:56px;top:0;width:9px;height:128px;background:#245f58;border-radius:0 0 8px 8px;box-shadow:0 0 0 1px rgba(255,255,255,.18)}
    .loader-copy{display:flex;flex-direction:column;gap:7px}
    .loader-copy strong{font-size:clamp(18px,4vw,24px);font-weight:500;letter-spacing:0}
    .loader-copy span{font-size:14px;line-height:1.6;color:#756b61}
    .loader-track{width:min(72vw,300px);height:4px;border-radius:999px;background:rgba(92,64,43,.13);overflow:hidden}
    .loader-track span{display:block;width:42%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#245f58,#c8915f,#7b2f2a);animation:loaderSlide 1.25s ease-in-out infinite}
    @keyframes pageFlip{0%,28%{transform:rotateY(0);opacity:0}42%{opacity:1}76%,100%{transform:rotateY(-150deg);opacity:0}}
    @keyframes loaderSlide{0%{transform:translateX(-105%)}100%{transform:translateX(245%)}}
  </style>
  <div id="shell"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>

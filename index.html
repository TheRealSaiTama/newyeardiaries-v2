<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Premium New Year Diaries, Corporate Planners & Executive Journals. Manufacturer direct pricing. Custom branding with debossing & foil stamping. Bulk orders from 25 units.">
  <title>New Year Diaries</title>
<!-- Speed: preconnect early, then load non-critical icon font non-render-blocking. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Poppins is used in the loader wordmark; load normally. -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<!-- Material Symbols is huge (~150KB). Defer it with the print/onload trick
     so it doesn't block first paint. The icons fall back to text/Unicode
     until it loads. -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"></noscript>
<!-- Tell the browser we'll need the JS module soon so it can warm the cache. -->
<link rel="modulepreload" href="/src/main.js">
</head>
<body>
  <!-- Splash is paint-cheap: a single SVG spinner, no images, no fonts to wait for. -->
  <div id="app-loader" role="status" aria-live="polite" aria-label="Loading">
    <div class="loader-inner">
      <!-- macOS-style 12-segment arc spinner (Spinning Wait). Pure SVG, GPU-cheap. -->
      <svg class="loader-spinner" viewBox="0 0 100 100" aria-hidden="true">
        <defs>
          <linearGradient id="ldg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#A0522D"/>
            <stop offset="100%" stop-color="#C4956A"/>
          </linearGradient>
        </defs>
        <g stroke="url(#ldg)" stroke-width="8" stroke-linecap="round" fill="none">
          <circle class="ld l0" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l1" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l2" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l3" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l4" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l5" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l6" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l7" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l8" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l9" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l10" cx="50" cy="50" r="42" pathLength="100"/>
          <circle class="ld l11" cx="50" cy="50" r="42" pathLength="100"/>
        </g>
      </svg>
      <div class="loader-wordmark">
        <span class="loader-name">New Year Diaries</span>
        <span class="loader-sub">Loading 2026 collection</span>
      </div>
    </div>
  </div>
  <style>
    /* ---- Splash ---- */
    #app-loader{
      position:fixed;inset:0;z-index:9999;
      display:grid;place-items:center;
      background:#fdf9f3;
      /* Faster fade — was 0.35s, now 0.18s. */
      transition:opacity .18s ease;
      /* Don't intercept scroll/click before reveal */
      pointer-events:none;
    }
    #app-loader.is-gone{opacity:0;}
    .loader-inner{
      display:flex;flex-direction:column;align-items:center;gap:18px;
      font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:#5a4632;
      /* Hint the browser this layer is compositor-friendly */
      will-change:opacity;
      transform:translateZ(0);
    }
    .loader-wordmark{display:flex;flex-direction:column;align-items:center;gap:4px}
    .loader-name{font-size:13px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#7a5a3b}
    .loader-sub{font-size:11px;letter-spacing:.06em;color:#a08a72}

    /* ---- macOS-style 12-segment arc spinner ----
       Each circle is the same 270deg arc; the .ld class rotates it so the
       segments fan around the ring; the staggered animation-delay creates
       the classic "trail of fading segments" effect. */
    .loader-spinner{width:36px;height:36px;display:block}
    .ld{
      transform-origin:50% 50%;
      animation:ld-spin 0.9s linear infinite, ld-fade 1.0s ease-in-out infinite;
      stroke-dasharray:0 100;
      stroke-dashoffset:0;
      opacity:0;
    }
    /* Stagger each segment around the ring */
    .l0 {animation-delay:0.00s, -1.00s; transform:rotate(0deg)}
    .l1 {animation-delay:0.00s, -0.92s; transform:rotate(30deg)}
    .l2 {animation-delay:0.00s, -0.83s; transform:rotate(60deg)}
    .l3 {animation-delay:0.00s, -0.75s; transform:rotate(90deg)}
    .l4 {animation-delay:0.00s, -0.67s; transform:rotate(120deg)}
    .l5 {animation-delay:0.00s, -0.58s; transform:rotate(150deg)}
    .l6 {animation-delay:0.00s, -0.50s; transform:rotate(180deg)}
    .l7 {animation-delay:0.00s, -0.42s; transform:rotate(210deg)}
    .l8 {animation-delay:0.00s, -0.33s; transform:rotate(240deg)}
    .l9 {animation-delay:0.00s, -0.25s; transform:rotate(270deg)}
    .l10{animation-delay:0.00s, -0.17s; transform:rotate(300deg)}
    .l11{animation-delay:0.00s, -0.08s; transform:rotate(330deg)}

    @keyframes ld-spin{
      to{ transform:rotate(360deg) }
    }
    /* The fade-in/out for each segment: a 270deg arc appears, peaks at
       full opacity, then fades. The staggered delay on each .lN gives
       the rotating "comet trail" look. */
    @keyframes ld-fade{
      0%   { stroke-dasharray:25 75; opacity:0; }
      8%   { stroke-dasharray:25 75; opacity:1; }
      30%  { stroke-dasharray:25 75; opacity:0.85; }
      60%  { stroke-dasharray:0 100;  opacity:0; }
      100% { stroke-dasharray:0 100;  opacity:0; }
    }

    /* Respect user preference: kill the animation if they want reduced motion */
    @media (prefers-reduced-motion: reduce){
      .loader-spinner{animation:none}
      .ld{animation:none;opacity:.6;stroke-dasharray:25 75}
    }
  </style>
  <div id="shell"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
